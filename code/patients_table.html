{% extends "patients.html" %}
{% block content %}
<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Diagnosis</th>
            <th>Treatment</th>
            <th>Priority</th>
        </tr> </thead>
    <tbody>
        {% for patient in patient_info %}
        <tr>
            <td>{{ patient.name }}</td>
            <td>{{ patient.diagnosis }}</td>
            <td>{{ patient.treatment }}</td>
            <td>{{ patient.priority }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
